# Basic ODK workflow

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ontology_qc:
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6.1
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Run ontology QC checks
        id: qc
        shell: bash
        run: |
          set +e
          LOG_FILE=/tmp/qc_output.txt
          XML_FILE=/tmp/xmllint_output.txt
          VVV_FILE=/tmp/vvv_output.txt

          cd src/ontology
          make ROBOT_ENV='ROBOT_JAVA_ARGS=-Xmx6G' test IMP=false PAT=false MIR=false 2>&1 | tee "$LOG_FILE"
          EXIT_CODE=${PIPESTATUS[0]}

          if [ $EXIT_CODE -ne 0 ]; then
            echo "## ❌ Ontology QC Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            echo "### Make output (errors only)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E "ERROR|Error|make: \*\*\*|INVALID|Could not|failed" "$LOG_FILE" | head -20 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 🔍 XML parse check — exact line/column" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat > /tmp/check_xml.py << 'PYEOF'
import xml.etree.ElementTree as ET
try:
    ET.parse("vivotest-edit.owl")
    print("XML is well-formed - error may be semantic rather than syntactic.")
except ET.ParseError as e:
    line, col = e.position
    print("XML parse error at line " + str(line) + ", column " + str(col) + ":")
    print("  " + str(e))
PYEOF
            python3 /tmp/check_xml.py 2>&1 | tee "$XML_FILE"
            cat "$XML_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 🔬 ROBOT verbose — RDF/XML parser section (-vvv)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            robot -vvv --catalog catalog-v001.xml convert \
              --input vivotest-edit.owl \
              --format ofn \
              --output /tmp/preprocess-debug.owl > "$VVV_FILE" 2>&1 || true
            grep -A 15 "RDFXMLParser\|SAXParseException\|lineNumber\|columnNumber\|com.sun.org.apache.xml" "$VVV_FILE" \
              | head -50 >> "$GITHUB_STEP_SUMMARY" \
              || echo "(no RDF/XML parser details found in -vvv output)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            echo "qc_failed=true" >> $GITHUB_OUTPUT
          else
            echo "## ✅ Ontology QC Passed" >> "$GITHUB_STEP_SUMMARY"
            echo "All checks passed successfully." >> "$GITHUB_STEP_SUMMARY"
            echo "qc_failed=false" >> $GITHUB_OUTPUT
          fi

          exit $EXIT_CODE

      - name: Post PR comment with error details
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let log = '';
            try {
              const raw = fs.readFileSync('/tmp/qc_output.txt', 'utf8');
              log = raw.split('\n')
                .filter(l => /ERROR|Error|make: \*\*\*|INVALID|Could not/.test(l))
                .slice(0, 30).join('\n');
            } catch(e) {
              log = 'Could not read log.';
            }

            let xmlSnippet = '';
            try {
              xmlSnippet = fs.readFileSync('/tmp/xmllint_output.txt', 'utf8').trim();
            } catch(e) {
              xmlSnippet = 'XML parse output not available.';
            }

            let vvvSnippet = '';
            try {
              const vvv = fs.readFileSync('/tmp/vvv_output.txt', 'utf8');
              const lines = vvv.split('\n');
              const relevant = [];
              for (let i = 0; i < lines.length; i++) {
                if (/RDFXMLParser|SAXParseException|lineNumber|columnNumber|com\.sun\.org\.apache\.xml/.test(lines[i])) {
                  relevant.push(...lines.slice(i, i + 15));
                }
              }
              vvvSnippet = relevant.slice(0, 60).join('\n') || '(no RDF/XML parser details found)';
            } catch(e) {
              vvvSnippet = 'Verbose log not available.';
            }

            const body = [
              '## ❌ Ontology QC Failed',
              '',
              'The ontology failed validation. Please fix `vivotest-edit.owl` before merging.',
              '',
              '<details>',
              '<summary>📋 Error lines from make (click to expand)</summary>',
              '',
              '```',
              log,
              '```',
              '',
              '</details>',
              '',
              '<details open>',
              '<summary>🔍 XML parse check — exact line/column</summary>',
              '',
              '```',
              xmlSnippet,
              '```',
              '',
              '</details>',
              '',
              '<details>',
              '<summary>🔬 ROBOT -vvv — RDF/XML parser section (click to expand)</summary>',
              '',
              '```',
              vvvSnippet,
              '```',
              '',
              '</details>',
              '',
              '---',
              '**Common causes of `INVALID ONTOLOGY FILE ERROR`:**',
              '- Missing closing `/>` or `>` in a tag',
              '- Invalid character in an `rdf:about` IRI (unencoded `<`, `>`, or space)',
              '- Broken namespace declaration in the ontology header',
              '- Duplicate `owl:Ontology` declarations',
              '',
              '📖 [ROBOT error docs](http://robot.obolibrary.org/errors#invalid-ontology-file-error)'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Upload QC log as downloadable artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qc-error-log
          path: |
            /tmp/qc_output.txt
            /tmp/xmllint_output.txt
            /tmp/vvv_output.txt
          retention-days: 7